<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>材料表（買い物リスト）— MuJoCo 蛇ロボ</title>
    <style>
      :root {
        --accent: #35c8ff;
        --panel: rgba(12, 18, 28, 0.84);
        --text: #d8e6f2;
        --muted: #7890a8;
        --good: #4ade80;
        --warn: #facc15;
        --bad: #ef4444;
        --line: rgba(53, 200, 255, 0.18);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #070806;
        color: var(--text);
        font-family: ui-sans-serif, system-ui, 'Segoe UI', Roboto, sans-serif;
        font-size: 14px;
        line-height: 1.5;
      }
      #page {
        max-width: 960px;
        margin: 0 auto;
        padding: 28px 20px 64px;
      }
      a {
        color: var(--accent);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      h1 {
        margin: 6px 0 2px;
        font-size: 22px;
        letter-spacing: 0.03em;
      }
      h2 {
        margin: 32px 0 10px;
        font-size: 15px;
        letter-spacing: 0.06em;
        color: var(--accent);
        border-bottom: 1px solid var(--line);
        padding-bottom: 6px;
      }
      .sub {
        color: var(--muted);
        font-size: 12.5px;
        margin: 0 0 4px;
      }
      .spec-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 10px;
        margin-top: 14px;
      }
      .spec-card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 14px;
      }
      .spec-card .k {
        color: var(--muted);
        font-size: 11px;
        letter-spacing: 0.04em;
      }
      .spec-card .v {
        font-size: 18px;
        font-weight: 600;
        color: var(--accent);
        font-variant-numeric: tabular-nums;
      }
      .spec-card .u {
        font-size: 12px;
        color: var(--muted);
        font-weight: 400;
      }
      .picker {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 12px;
        margin-top: 14px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 14px 16px;
      }
      label.field {
        display: flex;
        flex-direction: column;
        gap: 4px;
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.04em;
      }
      select {
        padding: 8px 10px;
        background: rgba(53, 200, 255, 0.1);
        color: var(--text);
        border: 1px solid rgba(53, 200, 255, 0.4);
        border-radius: 8px;
        font-size: 14px;
        cursor: pointer;
      }
      .total-card {
        margin-left: auto;
        text-align: right;
      }
      .total-card .k {
        color: var(--muted);
        font-size: 11px;
        letter-spacing: 0.04em;
      }
      .total-card .v {
        font-size: 26px;
        font-weight: 700;
        color: var(--good);
        font-variant-numeric: tabular-nums;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-variant-numeric: tabular-nums;
      }
      th,
      td {
        padding: 8px 10px;
        text-align: left;
        border-bottom: 1px solid var(--line);
        font-size: 13px;
      }
      th {
        color: var(--muted);
        font-weight: 600;
        font-size: 11px;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }
      td.num,
      th.num {
        text-align: right;
        white-space: nowrap;
      }
      td.note {
        color: var(--muted);
        font-size: 11.5px;
      }
      tr.total-row td {
        border-top: 2px solid var(--accent);
        border-bottom: none;
        font-size: 15px;
        font-weight: 700;
        padding-top: 12px;
      }
      tr.total-row td.num {
        color: var(--good);
      }
      tr.recommended {
        background: rgba(53, 200, 255, 0.08);
      }
      .badge {
        display: inline-block;
        padding: 1px 8px;
        border-radius: 999px;
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.03em;
        margin-left: 6px;
        vertical-align: middle;
      }
      .badge.recommended {
        background: var(--accent);
        color: #04121b;
      }
      .badge.cheapest {
        background: rgba(74, 222, 128, 0.2);
        color: var(--good);
        border: 1px solid rgba(74, 222, 128, 0.5);
      }
      .badge.premium {
        background: rgba(250, 204, 21, 0.16);
        color: var(--warn);
        border: 1px solid rgba(250, 204, 21, 0.5);
      }
      .ok {
        color: var(--good);
      }
      .ng {
        color: var(--bad);
      }
      .notes {
        margin-top: 28px;
        padding-top: 14px;
        border-top: 1px solid var(--line);
        color: var(--muted);
        font-size: 11.5px;
      }
      .notes li {
        margin-bottom: 5px;
      }
      .callout {
        margin-top: 12px;
        background: rgba(53, 200, 255, 0.06);
        border: 1px solid var(--line);
        border-left: 3px solid var(--accent);
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 12.5px;
      }
    </style>
  </head>
  <body>
    <main id="page">
      <header>
        <a class="back" href="./index.html">← シミュレータへ戻る</a>
        <h1>材料表（買い物リスト）</h1>
        <p class="sub">
          MuJoCo 蛇ロボを実際に作るための部品・個数・価格。サーボを選ぶと合計金額が変わります。
        </p>
      </header>

      <section id="spec"></section>
      <!-- 蛇の前提（リンク数・関節数・質量・必要トルク） -->

      <section>
        <h2>① サーボ選択と合計</h2>
        <div class="picker" id="picker"></div>
      </section>

      <section>
        <h2>② 買い物リスト</h2>
        <div id="bom"></div>
      </section>

      <section>
        <h2>③ サーボ比較（必要トルク・価格・質量・位置帰還）</h2>
        <div id="servo-compare"></div>
        <div class="callout" id="why-recommended"></div>
      </section>

      <section>
        <h2>④ サーボ選択による合計金額の比較</h2>
        <div id="total-compare"></div>
      </section>

      <footer class="notes">
        <ul id="notes"></ul>
      </footer>
    </main>
    <script type="module" src="/src/materials.ts"></script>
  </body>
</html>
