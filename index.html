<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Microbots — MuJoCo 蛇シミュレータ</title>
    <style>
      :root {
        --accent: #35c8ff;
        --panel: rgba(12, 18, 28, 0.84);
        --text: #d8e6f2;
        --muted: #7890a8;
        --good: #4ade80;
        --warn: #facc15;
        --bad: #ef4444;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #070806;
        color: var(--text);
        font-family: ui-sans-serif, system-ui, 'Segoe UI', Roboto, sans-serif;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      #panel {
        position: fixed;
        top: 16px;
        left: 16px;
        width: 340px;
        max-height: calc(100vh - 32px);
        overflow-y: auto;
        padding: 16px 18px;
        background: var(--panel);
        border: 1px solid rgba(53, 200, 255, 0.25);
        border-radius: 12px;
        backdrop-filter: blur(8px);
        font-size: 13px;
        user-select: none;
      }
      h1 {
        margin: 0 0 2px;
        font-size: 15px;
        letter-spacing: 0.04em;
      }
      .sub {
        color: var(--muted);
        font-size: 11px;
        margin-bottom: 12px;
      }
      .sub a {
        color: var(--accent);
        text-decoration: none;
      }
      .row {
        display: flex;
        gap: 8px;
        margin-bottom: 10px;
      }
      button {
        flex: 1;
        padding: 8px 10px;
        background: rgba(53, 200, 255, 0.12);
        color: var(--text);
        border: 1px solid rgba(53, 200, 255, 0.4);
        border-radius: 8px;
        cursor: pointer;
        font-size: 13px;
      }
      button.active {
        background: var(--accent);
        color: #04121b;
        font-weight: 600;
      }
      select {
        flex: 1;
        padding: 7px 8px;
        background: rgba(53, 200, 255, 0.1);
        color: var(--text);
        border: 1px solid rgba(53, 200, 255, 0.4);
        border-radius: 8px;
        font-size: 12px;
        cursor: pointer;
      }
      select:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      label {
        margin: 9px 0 3px;
        font-size: 11px;
        color: var(--muted);
        display: flex;
        justify-content: space-between;
      }
      label span {
        color: var(--accent);
      }
      input[type='range'] {
        width: 100%;
        accent-color: var(--accent);
      }
      .section-title {
        margin: 14px 0 2px;
        font-size: 11px;
        letter-spacing: 0.08em;
        color: var(--muted);
        text-transform: uppercase;
        border-top: 1px solid rgba(53, 200, 255, 0.18);
        padding-top: 10px;
      }
      .stats {
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid rgba(53, 200, 255, 0.18);
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 5px 10px;
        font-variant-numeric: tabular-nums;
        font-size: 12px;
      }
      .stats b {
        color: var(--accent);
        font-weight: 600;
      }
      .stats b.good {
        color: var(--good);
      }
      .stats b.warn {
        color: var(--warn);
      }
      .stats b.bad {
        color: var(--bad);
      }
      .tuned-info {
        font-size: 12px;
        color: var(--text);
        margin: 8px 0 4px;
        min-height: 16px;
        font-variant-numeric: tabular-nums;
      }
      .hint {
        font-size: 11px;
        color: var(--muted);
        margin: 2px 0 4px;
        line-height: 1.45;
      }
      details#advanced {
        margin-top: 14px;
        border-top: 1px solid rgba(53, 200, 255, 0.18);
        padding-top: 8px;
      }
      details#advanced > summary {
        cursor: pointer;
        font-size: 11px;
        letter-spacing: 0.06em;
        color: var(--muted);
        text-transform: uppercase;
        list-style: none;
      }
      details#advanced > summary::-webkit-details-marker {
        display: none;
      }
      details#advanced > summary::before {
        content: '▸ ';
      }
      details#advanced[open] > summary::before {
        content: '▾ ';
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="panel">
      <h1 id="title">MICROBOTS</h1>
      <div class="sub">MuJoCo 蛇 — 関節構成 × 歩容 × モーター選定</div>
      <div class="sub" id="mech-subtitle" style="margin-top: -8px"></div>
      <div class="sub" style="margin-top: -6px">
        <a id="link-materials" href="./materials.html">🛒 材料表（買い物リスト）→</a>
      </div>
      <!-- ① 何を見るか: モーター × コース -->
      <div class="section-title">① モーター ＆ コース</div>
      <div class="row">
        <!-- options populated from UI_MECHANISMS (snake-only) in dashboard.ts; hidden when single -->
        <select id="sel-mech"></select>
        <!-- options populated from SELECTABLE_SERVO_IDS in dashboard.ts -->
        <select id="sel-motor" title="モーター（サーボ）"></select>
      </div>
      <div class="row">
        <!-- options populated from COURSE_OPTIONS in dashboard.ts -->
        <select id="sel-course" title="コース（地形）"></select>
      </div>

      <!-- ② どう動かすか: モード ＋ 操舵 ＋ 結果 -->
      <div id="learned-gait">
        <div class="section-title">② 動かし方</div>
        <div class="row">
          <button id="btn-scripted" class="active" title="開ループの基盤登坂歩容（残差0）">
            基盤歩容
          </button>
          <button
            id="btn-rl"
            disabled
            title="録画済み方策の再生（この コース×モーター に無ければ無効）"
          >
            RL録画
          </button>
          <button
            id="btn-live"
            disabled
            title="方策をブラウザ内でリアルタイム駆動（スライダーで即操舵）"
          >
            ライブ
          </button>
        </div>
        <!-- 操舵: 方策に与える目標方位（相対方位）。RL=最近傍の録画方位を再生 / ライブ=連続で即操舵。scripted では非表示。 -->
        <div id="heading-ctl" style="display: none">
          <label>目標方位（操舵） <span id="v-heading">0°</span></label>
          <input id="s-heading" type="range" min="-25" max="25" step="5" value="0" />
        </div>
        <div class="tuned-info" id="tuned-info"></div>
        <div class="hint" id="mode-hint"></div>
      </div>

      <!-- ③ 再生コントロール -->
      <div class="section-title">③ 再生</div>
      <div class="row">
        <button id="btn-play" class="active">⏸ 一時停止</button>
        <button id="btn-reset">先頭へ</button>
      </div>
      <label>再生位置 <span id="v-time">0.00s</span></label>
      <input id="s-time" type="range" min="0" max="4" step="0.01" value="0" />
      <label>再生速度 <span id="v-speed">1.00x</span></label>
      <input id="s-speed" type="range" min="0.25" max="2" step="0.05" value="1" />

      <!-- rows injected from liveStats()/resultStats() in dashboard.ts -->
      <div class="stats" id="stats"></div>

      <!-- 詳細（折りたたみ）: 普段は触らない歩容パラメータとトルク上限 -->
      <details id="advanced">
        <summary>詳細設定（歩容パラメータ・トルク上限）</summary>
        <label>モーター τ上限 <span id="v-torque-cap">2.94 N·m</span></label>
        <input id="s-torque-cap" type="range" min="0.05" max="3.5" step="0.05" value="2.94" />
        <div class="section-title">モーション（初期歩容を与える）</div>
        <!-- sliders injected from mechanism.params in dashboard.ts -->
        <div id="param-sliders"></div>
      </details>
    </div>
    <script type="module" src="/src/dashboard.ts"></script>
  </body>
</html>
